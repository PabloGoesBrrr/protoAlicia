<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Canvas</title>
</head>
<body>
    <section class="container">
        <aside id="toolbar">


            <div class="control-group">
                <label for="stroke">Cor</label>
                <input id="stroke" name="stroke" type="color">
            </div>

            <div class="control-group">
                <label for="lineWidth">
                    Tamanho do Traço:
                    <span id="sizeValue">5</span>px
                </label>

                <input id="lineWidth" name="lineWidth"
                type="range" min="1" max="50" value="5">
            </div>

            <button id="clear">Limpar</button>
            <button id="eraser">Borracha</button>
            <button id="caneta">Caneta</button>

            <div class="tool-status">
                Ferramenta:
                <span id="tool">Caneta</span>
            </div>
        </aside>

        <div class="drawing-board">
            <canvas id="drawing-board"></canvas>
        </div>
    </section>

    <script src="./canvas.js"></script>
</body>
</html>
